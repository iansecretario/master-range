            username: ranger
            password: see ~/labs/<range_name>/credentials.txt on operator's machine
                       (or `cat /opt/adaptix/profile.yaml | grep password` on the teamserver)

      Sliver client (CLI):
          ./sliver-client                       # opens interactive shell
          The operator config is auto-imported by Ansible into
