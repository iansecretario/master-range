- name: Create XFCE desktop launcher for Mythic web UI
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/Desktop/Tools/Mythic Web UI.desktop"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
    content: |
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=Mythic Web UI
      Comment=Open Mythic operator web interface (https://10.{{ terra_student_index | default(1) }}.1.7:7443)
      Exec=firefox https://10.{{ terra_student_index | default(1) }}.1.7:7443
      Icon=firefox
      Terminal=false
      Categories=Network;Security;

# ---- Sliver C2 client launchers ------------------------------------------
# Goal: operator RDPs into Kali via Guacamole, and a Sliver C2 console is
# already at the `[server] sliver >` prompt without them having to open a
# terminal + chdir + ./sliver-client. The operator.cfg dropped earlier
# (~/.sliver-client/configs/operator.cfg) means `sliver-client` connects
# automatically — we just need a window running it.
#
# Two complementary entries:
#   1. ~/Desktop/Tools/Sliver C2.desktop   — clickable icon for relaunch.
#   2. ~/.config/autostart/cwr-sliver.desktop — XFCE Autostart, fires
#      once per session when the XFCE session manager replays the
#      autostart dir. RDP-via-xrdp triggers a fresh session each login,
#      so the operator gets a Sliver terminal automatically.
#
# Both invoke `xfce4-terminal --command 'bash -c "...; exec bash"'` so
# the terminal stays open if sliver-client exits (operator sees any
# error message + drops to a shell rather than a window flashing closed).

- name: Create XFCE desktop launcher for Sliver C2 client
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/Desktop/Tools/Sliver C2.desktop"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
    content: |
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=Sliver C2
      Comment=Launch Sliver operator console (auto-loads ~/.sliver-client/configs/operator.cfg)
      Exec=xfce4-terminal --title=Sliver-C2 --command="bash -c 'cd ~/Desktop/Tools && ./sliver-client; echo; echo [sliver-client exited — Ctrl-D or close to dismiss]; exec bash'"
      Icon=utilities-terminal
      Terminal=false
      Categories=Network;Security;

- name: Ensure ~/.config/autostart exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/autostart"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Autostart Sliver C2 client on XFCE session login
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/.config/autostart/cwr-sliver.desktop"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=Sliver C2 (autostart)
      Comment=Open a Sliver operator console at session start
      Exec=xfce4-terminal --title=Sliver-C2 --command="bash -c 'cd ~/Desktop/Tools && ./sliver-client; echo; echo [sliver-client exited — Ctrl-D or close to dismiss]; exec bash'"
      X-GNOME-Autostart-enabled=true
      Hidden=false
      NoDisplay=false
      OnlyShowIn=XFCE;
      # 5s delay lets xrdp finish drawing the desktop + the panel/dock
      # come up before our terminal pops, so the operator doesn't see
      # a flicker / focus-fight on first login.
      X-GNOME-Autostart-Delay=5

# ---- Adaptix C2 client launcher ----
# AdaptixClient is a Qt GUI built earlier from source; the binary lives
# at ~/Desktop/Tools/AdaptixC2/dist/AdaptixClient, symlinked to
# ~/Desktop/Tools/adaptix-client. Drop a .desktop alongside the Sliver
# one so double-click works just like Mythic Web UI.

# Pre-launch wrapper that re-seeds the `cwr` row in storage-v1.db with
# canonical values every time the operator launches the client.
#
# Why we need it: AdaptixClient's Qt GUI serializes the port field as
# a string on save (so port=9000 becomes "9000"), and after the user
# edits the URL field at all it sometimes reverts port to 443 (the
# default HTTPS port → URL builder hides it from the display, so the
# operator sees "https://10.1.1.5/endpoint" and the connect fails
# silently). The kali ansible role's earlier seed task in this file
# only fires on `./range repair`; this wrapper makes the seed
# IDEMPOTENT on every double-click of the desktop launcher.
- name: Install adaptix-client pre-launch wrapper
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/.local/bin/adaptix-client-launch"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      # Adaptix client launcher wrapper. Re-seeds the cwr profile in
      # storage-v1.db before exec'ing the real client, so a previous
      # corruption (port serialized as string, port reverted to 443,
      # missing endpoint) doesn't survive into the next session.

      DB="$HOME/.adaptix/storage-v1.db"
      mkdir -p "$(dirname "$DB")"

      python3 - "$DB" <<'PY'
      import json, sqlite3, sys
      db = sys.argv[1]
      con = sqlite3.connect(db)
      con.execute("CREATE TABLE IF NOT EXISTS Projects "
                  "(project TEXT UNIQUE PRIMARY KEY, data TEXT)")
      data = {
          "host":             "{{ adaptix_seed_host | default('10.1.1.5') }}",
          # Stored as int. Qt may re-save as string on first GUI
          # interaction; that's fine for next-time reads. What we
          # MUST avoid is the row drifting to port=443 / endpoint="/"
          # which is the silent failure mode.
          "port":             {{ adaptix_seed_port | default(9000) }},
          "endpoint":         "/endpoint",
          "username":         "{{ adaptix_seed_user | default('ranger') }}",
          "password":         "{{ adaptix_seed_password | default('') }}",
          "projectDir":       "/home/{{ ansible_user }}/AdaptixProjects/{{ adaptix_seed_project | default('cwr') }}",
          "subscriptions":    [],
          "consoleMultiuser": False,
      }
      con.execute("DELETE FROM Projects WHERE project = ?",
                  ("{{ adaptix_seed_project | default('cwr') }}",))
      con.execute("INSERT INTO Projects (project, data) VALUES (?, ?)",
                  ("{{ adaptix_seed_project | default('cwr') }}",
                   json.dumps(data, separators=(",", ":"))))
      con.commit()
      PY

      # Now exec the real client. The right-pane profile list will show
      # exactly one entry ("cwr") with correct host:port/endpoint.
      exec /home/{{ ansible_user }}/Desktop/Tools/adaptix-client "$@"
  become: true
  when: adaptix_seed_password is defined

- name: Create XFCE desktop launcher for Adaptix C2 client
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/Desktop/Tools/Adaptix C2.desktop"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
    content: |
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=Adaptix C2
      Comment=Launch AdaptixClient (pre-seeds cwr profile every launch)
      Exec=/home/{{ ansible_user }}/.local/bin/adaptix-client-launch
      Path=/home/{{ ansible_user }}/Desktop/Tools
      Icon=utilities-terminal
      Terminal=false
      Categories=Network;Security;

# ---- Auto-trust XFCE .desktop launchers ----
# XFCE 4.18+ added a "Allow this file to run as a program" prompt on
# double-clicking any .desktop file unless the file is marked TRUSTED.
# `chmod +x` alone no longer bypasses this — the trust flag is stored
# as GIO metadata at ~/.local/share/gvfs-metadata/, written by
# `gio set <file> metadata::trusted true`. That call needs the user's
# DBUS session, so we can't do it from ansible-as-ranger-over-SSH
# (no session there). Instead: drop a tiny autostart that runs once
# per session and marks every .desktop in Desktop/ and Desktop/Tools/
# as trusted. First login after deploy: trust gets set in metadata; any
# subsequent double-click goes through without the prompt. The
# X-GNOME-Autostart-Delay=0 (no delay) ensures this runs before the
# user can race-click an untrusted launcher.
- name: Autostart — trust all CWR .desktop launchers on session start
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/.config/autostart/cwr-trust-launchers.desktop"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=CWR — trust desktop launchers
      Comment=Marks ~/Desktop and ~/Desktop/Tools .desktop files as trusted (silences XFCE 4.18+ launcher prompt)
      # Set BOTH metadata flags: GNOME/Nautilus uses `trusted`, XFCE/
      # Thunar uses `xfce-trusted` (and sometimes the legacy
      # `xfce4-trusted`). Setting all three covers Thunar and any
      # secondary file manager the operator might launch. Also chmod
      # +x in case some prior step stripped the bit — XFCE also
      # requires the executable bit set, separately from the metadata.
      Exec=bash -lc 'for f in $HOME/Desktop/*.desktop $HOME/Desktop/Tools/*.desktop; do [ -f "$f" ] || continue; chmod +x "$f"; for k in trusted xfce-trusted xfce4-trusted; do gio set "$f" "metadata::$k" true 2>/dev/null; done; done; true'
      X-GNOME-Autostart-enabled=true
      Hidden=false
      NoDisplay=true
      OnlyShowIn=XFCE;
      X-GNOME-Autostart-Delay=0

# ---------- Diagnostics ----------
- name: Always emit Kali diagnostics
  block:
    - name: Diagnostic marker
      ansible.builtin.debug:
        msg: "Emitting Kali diagnostic dump"
      changed_when: false
  always:
    - name: Snapshot xrdp service state
      ansible.builtin.command: systemctl is-active xrdp
      register: xrdp_state
      changed_when: false
      failed_when: false
      become: true
    - name: Snapshot installed kali metapackages
      ansible.builtin.shell:
        cmd: "dpkg -l 'kali-linux-*' 'kali-desktop-*' 2>/dev/null | awk '/^ii/ {print $2, $3}'"
      register: kali_pkgs
      changed_when: false
      failed_when: false
      become: true
    - name: Report — Kali state
      ansible.builtin.debug:
        msg: "{{ ['---- kali xrdp + packages ----',
                  'xrdp.service: ' ~ (xrdp_state.stdout | default('unknown'))] +
                 (kali_pkgs.stdout_lines | default(['(no kali metapackages installed)'])) }}"
