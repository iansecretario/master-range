# =============================================================================
# terra-range ansible configuration
# =============================================================================
# This file is loaded automatically when ansible-playbook is run from
# inside modules/azure/ansible/ (or when ANSIBLE_CONFIG points at it).
# The `./range repair` wrapper sets ANSIBLE_CONFIG explicitly so the
# operator can invoke from anywhere.

[defaults]
inventory             = ./inventory.py
roles_path            = ./roles
host_key_checking     = False
retry_files_enabled   = False
# forks: 4 (was 12). With ControlMaster disabled every task opens a
# fresh TCP, so 12 simultaneous handshakes during fan-out triggered
# Kali sshd's "banner exchange: invalid format" path even with
# MaxStartups bumped on the sshd side — looks like a peering /
# conntrack interaction we can't tune from inside the VM. 4 is
# enough parallelism for the 13-host redteam-lab; bump back up if
# you scale to many students AND can confirm peering doesn't drop.
forks                 = 4
gathering             = smart
# timeout: 60 (was 30). Empirically the SSH path to Kali sees ~30-40s
# blackout windows after long idle periods (Azure VNet peering forwarding
# table eviction, suspected — exact cause not yet root-caused). A 60s
# task timeout absorbs that window; ConnectTimeout in ssh_args still
# caps the per-attempt setup. The cost when EVERYTHING works is zero;
# tasks return at module-speed, not at timeout.
timeout               = 60
display_skipped_hosts = False
display_ok_hosts      = True
deprecation_warnings  = False
# YAML-style task results in the default callback. The old
# `stdout_callback = community.general.yaml` was removed in
# community.general 12.0.0; the built-in default callback's
# `result_format = yaml` is the supported replacement (ansible-core >= 2.13).
stdout_callback       = default
result_format         = yaml

[ssh_connection]
# Pipelining is kept ON — it batches multiple module ops over a single
# SSH channel and requires `requiretty` to be disabled in /etc/sudoers
# (default on every Ubuntu/Kali image we use).
#
# ControlMaster is DELIBERATELY DISABLED.
#
# Tried twice to use ControlMaster=auto + ControlPersist for the
# per-task TCP setup savings (~300ms/task), and twice ran into the
# same recurring failure mode against the Kali VM:
#
#   1. First run completes; ControlPersist=60s keeps the master alive.
#   2. Something half-closes the underlying TCP (Azure peering NIC
#      drops the flow from its forwarding table, or sshd ends the
#      session — the trigger is hard to pin down but the symptom is
#      obvious in /var/log/auth.log on Kali).
#   3. Master ssh process keeps the unix-domain socket file alive
#      because ControlPersist hasn't expired.
#   4. Next ansible task reuses the socket, writes SSH protocol bytes
#      into the dead TCP.
#   5. Kali sshd reads garbage and logs
#        "banner exchange: ... invalid format"
#      The ansible client hangs the full ConnectTimeout (30s) and
#      surfaces as `UNREACHABLE! Operation timed out`.
#
# ServerAliveInterval/CountMax can't rescue this — the keepalive needs
# 3 × 15s = 45s to declare death, but ansible's task ConnectTimeout
# fires at 30s. We could bump task timeout to 60s but the operator
# would then wait 60s per stuck task; ~50 tasks/role means worst-case
# 50 minutes of needless waiting.
#
# Hard-disabling ControlMaster (ControlPath=none) makes every task
# open a fresh TCP — no shared state, no recycle bug. Cost: ~200-300ms
# of TCP+SSH+auth per task. For ~50 tasks across the kali role that's
# ~12-15s extra wall time. Worth it; the previous setting failed often
# enough to require live patches every other deploy.
#
# `./range repair` ALSO clears /home/guacadmin/.ansible/cp/ at run
# start as belt-and-braces against any stale sockets that survived a
# previous run with the older config.
pipelining       = True
ssh_args         = -o ControlMaster=no -o ControlPath=none -o ServerAliveInterval=15 -o ServerAliveCountMax=2 -o ConnectTimeout=20
control_path_dir = ~/.ansible/cp
